# Vishwakarma — Example Configuration
# Copy to config.yaml and fill in your values
# All fields can also be set via environment variables (VK_ prefix)

# ── LLM ───────────────────────────────────────────────────────────────────────
llm:
  model: openai/gpt-4o              # any OpenAI-compatible model
  # model: openai/open-large        # Juspay AI example
  api_base: https://<llm-api-base>  # omit for OpenAI default
  api_key: sk-xxx                   # or set VK_API_KEY env var
  fast_model: openai/gpt-4o-mini    # used for summarisation, chat, compaction
  # fast_model: openai/open-fast    # Juspay AI example
  max_tokens: 65536
  temperature: 0.0
  timeout: 300

# ── Cluster ───────────────────────────────────────────────────────────────────
cluster_name: my-cluster            # shown to LLM in every investigation
max_steps: 40                       # max agentic loop iterations
dedup_window: 300                   # seconds — suppress duplicate alerts

# ── Server ────────────────────────────────────────────────────────────────────
server:
  host: 0.0.0.0
  port: 5050

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  db_path: /data/vishwakarma.db     # SQLite — incident history (on PVC)

# ── Site Knowledge Base ────────────────────────────────────────────────────────
# Injected into every investigation. Put cluster-specific facts here:
# instance IDs, namespaces, metric names, proven commands, IAM gaps.
# In Kubernetes: mounted from ConfigMap — edit without rebuilding image.
knowledge_path: /etc/vishwakarma/knowledge.md

# ── Slack Bot ─────────────────────────────────────────────────────────────────
# slack:
#   bot_token: xoxb-xxx             # or set SLACK_BOT_TOKEN env var
#   app_token: xapp-xxx             # or set SLACK_APP_TOKEN env var
#   signing_secret: xxx             # or set SLACK_SIGNING_SECRET env var

# ── Toolsets ──────────────────────────────────────────────────────────────────
toolsets:

  # Recommended: use bash + kubectl instead of kubernetes/kubernetes_logs
  kubernetes:
    enabled: false

  kubernetes_logs:
    enabled: false

  prometheus:
    enabled: true
    config:
      url: http://prometheus.monitoring.svc.cluster.local:9090
      # For VictoriaMetrics:
      # url: http://vmselect.monitoring.svc.cluster.local:8481/select/0/prometheus
      # bearer_token: xxx   # if auth required

  elasticsearch:
    enabled: true
    config:
      url: http://elasticsearch.logging.svc.cluster.local:9200
      # username: elastic
      # password: xxx

  grafana:
    enabled: false
    config:
      url: http://grafana.monitoring.svc.cluster.local:3000
      api_key: glsa_xxx             # Grafana Service Account token

  bash:
    enabled: true
    config:
      safe_mode: false              # true = only pre-approved commands
      allow:                        # always allow these command prefixes
        - kubectl
        - aws
        - stern
        - echo
        - timeout
        - grep
        - head
        - tail
        - jq
        - awk
        - sort
        - uniq
        - cat
        - date
      block:                        # always block these command prefixes
        - rm
        - curl
        - wget
        - env
        - printenv
        - python
        - pip

  learnings:
    enabled: true
    # config:
    #   path: /data/learnings       # default — on PVC, survives deploys

  todo:
    enabled: true

  http:
    enabled: true
    config:
      timeout: 30

  internet:
    enabled: true
    config:
      timeout: 10

  database:
    enabled: false
    config:
      connections:
        - name: app_db
          type: postgresql
          host: ${DB_HOST}          # from env
          port: 5432
          database: my_app_db
          username: readonly
          password: ${DB_PASS}
