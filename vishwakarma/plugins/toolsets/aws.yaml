name: aws
description: "Query AWS services: CloudWatch metrics/logs, RDS, ElastiCache, EC2, EKS."
enabled: true
prerequisites:
  - command: aws sts get-caller-identity
    error: "AWS CLI not configured. Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (or use IAM role)."

tools:
  - name: aws_cloudwatch_get_metric
    description: "Get CloudWatch metric statistics for a metric."
    command: >
      aws cloudwatch get-metric-statistics
      --namespace {namespace}
      --metric-name {metric_name}
      --dimensions {dimensions}
      --start-time {start_time}
      --end-time {end_time}
      --period {period}
      --statistics {statistics}
      --region {region}
    params:
      - name: namespace
        description: "e.g. AWS/RDS, AWS/ElastiCache, AWS/EKS"
        type: string
        required: true
      - name: metric_name
        type: string
        required: true
      - name: dimensions
        description: "e.g. 'Name=DBInstanceIdentifier,Value=my-db'"
        type: string
        required: true
      - name: start_time
        description: "ISO 8601 e.g. 2024-01-01T00:00:00Z"
        type: string
        required: true
      - name: end_time
        type: string
        required: true
      - name: period
        description: "Seconds e.g. 300"
        type: integer
        default: 300
      - name: statistics
        description: "Average|Sum|Maximum|Minimum|SampleCount"
        type: string
        default: "Average"
      - name: region
        type: string
        default: "<region>"

  - name: aws_cloudwatch_logs_query
    description: "Query CloudWatch Logs Insights."
    command: >
      aws logs start-query
      --log-group-name {log_group}
      --start-time {start_time}
      --end-time {end_time}
      --query-string {query_string}
      --region {region}
    params:
      - name: log_group
        type: string
        required: true
      - name: start_time
        description: "Unix timestamp in seconds"
        type: integer
        required: true
      - name: end_time
        type: integer
        required: true
      - name: query_string
        description: "CloudWatch Insights query"
        type: string
        required: true
      - name: region
        type: string
        default: "<region>"

  - name: aws_rds_describe_instances
    description: "List RDS instances and their status."
    command: "aws rds describe-db-instances --region {region} {args}"
    params:
      - name: region
        type: string
        default: "<region>"
      - name: args
        type: string
        default: ""

  - name: aws_rds_describe_events
    description: "Get recent RDS events (failovers, restarts, maintenance)."
    command: "aws rds describe-events --duration {duration} --region {region} {args}"
    params:
      - name: duration
        description: "Minutes e.g. 60"
        type: integer
        default: 60
      - name: region
        type: string
        default: "<region>"
      - name: args
        type: string
        default: ""

  - name: aws_elasticache_describe_clusters
    description: "List ElastiCache clusters and their status."
    command: "aws elasticache describe-cache-clusters --show-cache-node-info --region {region}"
    params:
      - name: region
        type: string
        default: "<region>"

  - name: aws_ec2_describe_instances
    description: "List EC2 instances with state and metadata."
    command: "aws ec2 describe-instances --region {region} {args}"
    params:
      - name: region
        type: string
        default: "<region>"
      - name: args
        type: string
        default: ""

  - name: aws_eks_describe_cluster
    description: "Describe an EKS cluster."
    command: "aws eks describe-cluster --name {cluster_name} --region {region}"
    params:
      - name: cluster_name
        type: string
        required: true
      - name: region
        type: string
        default: "<region>"

  - name: aws_alb_describe_target_health
    description: "Check ALB target group health."
    command: "aws elbv2 describe-target-health --target-group-arn {target_group_arn} --region {region}"
    params:
      - name: target_group_arn
        type: string
        required: true
      - name: region
        type: string
        default: "<region>"
